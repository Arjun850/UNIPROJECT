<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student Profile</title>
    <link rel="stylesheet" href="../css/faculty-edit.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
    <script src="../js/supabase.js"></script>
</head>
<body>

    <!-- NAVBAR -->
    <header class="topbar">
        <div class="nav-left">
            <div class="logo-box">🎓</div>
            <h1 class="logo-text">Uni<span>Projects</span></h1>
        </div>
        <button id="backBtn" class="back-btn">Back to Profile</button>
    </header>

    <!-- MAIN -->
    <main class="edit-wrapper">
        <div class="edit-card">
            <h1>Edit Student Profile</h1>
            
            <!-- FORM -->
            <form id="studentEditForm" onsubmit="event.preventDefault();">
                <div class="input-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter full name">
                </div>

                <div class="input-group">
                    <label for="emailInput">Email (read-only)</label>
                    <input type="email" id="emailInput" readonly disabled>
                </div>

                <div class="grid-2">
                    <div class="input-group">
                        <label for="rollNoInput">Roll Number (auto-derived)</label>
                        <input type="text" id="rollNoInput" placeholder="e.g. 23598" readonly disabled class="bg-gray-50 cursor-not-allowed">
                    </div>
                    <div class="input-group">
                        <label for="deptInput">Department</label>
                        <input type="text" id="deptInput" placeholder="e.g. Computer Science">
                    </div>
                </div>

                <div class="grid-2">
                    <div class="input-group">
                        <label for="programInput">Program</label>
                        <input type="text" id="programInput" placeholder="e.g. B.Tech">
                    </div>
                    <div class="input-group">
                        <label for="yearInput">Year</label>
                        <input type="text" id="yearInput" placeholder="e.g. 3rd Year">
                    </div>
                </div>

                <div class="grid-2">
                    <div class="input-group">
                        <label for="domainInput">Domain</label>
                        <input type="text" id="domainInput" placeholder="e.g. Machine Learning">
                    </div>
                    <div class="input-group">
                        <label for="skillsInput">Skills (comma separated)</label>
                        <input type="text" id="skillsInput" placeholder="e.g. Python, ML, React">
                    </div>
                </div>

                <div class="input-group">
                    <label for="bioInput">Bio</label>
                    <textarea id="bioInput" rows="5" placeholder="Write something about yourself..."></textarea>
                </div>

                <div class="grid-2">
                    <div class="input-group">
                        <label for="githubEditInput">GitHub URL</label>
                        <input type="url" id="githubEditInput" placeholder="https://github.com/...">
                    </div>
                    <div class="input-group">
                        <label for="linkedinEditInput">LinkedIn URL</label>
                        <input type="url" id="linkedinEditInput" placeholder="https://linkedin.com/in/...">
                    </div>
                </div>

                <div class="grid-2">
                    <div class="input-group">
                        <label for="portfolioEditInput">Portfolio URL</label>
                        <input type="url" id="portfolioEditInput" placeholder="https://yourwebsite.com">
                    </div>
                    <div class="input-group">
                        <label for="uploadEditPic">Profile Image</label>
                        <input type="file" id="uploadEditPic" accept="image/*">
                    </div>
                </div>

                <button id="saveBtn" type="button" class="save-btn">Save Changes</button>
            </form>
        </div>
    </main>

    <script src="../js/profile-edit.js"></script>
</body>
</html>
